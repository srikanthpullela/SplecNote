<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gb" x1="300" y1="330" x2="720" y2="690" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#22D3EE"/>
      <stop offset="1" stop-color="#818CF8"/>
    </linearGradient>
    <filter id="glow" x="-70%" y="-70%" width="240%" height="240%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
  </defs>

  <!-- Near-black tile -->
  <rect x="96" y="96" width="832" height="832" rx="206" fill="#0E1220"/>
  <rect x="112.5" y="112.5" width="799" height="799" rx="190" fill="none" stroke="#ffffff" stroke-opacity="0.07" stroke-width="3"/>

  <!-- Code brackets (cyan -> indigo) -->
  <g stroke="url(#gb)" stroke-width="52" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <polyline points="430,346 308,512 430,678"/>
    <polyline points="594,346 716,512 594,678"/>
  </g>

  <!-- Live breakpoint pulse rings -->
  <circle cx="512" cy="512" r="78" fill="none" stroke="#ffffff" stroke-opacity="0.22" stroke-width="7"/>
  <circle cx="512" cy="512" r="106" fill="none" stroke="#ffffff" stroke-opacity="0.10" stroke-width="6"/>

  <!-- Breakpoint dot + glow -->
  <circle cx="512" cy="514" r="52" fill="#FB3B5C" opacity="0.45" filter="url(#glow)"/>
  <circle cx="512" cy="512" r="42" fill="#FB3B5C"/>
</svg>
