<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Splec mark: Dancing Script "S" in a periwinkle->purple gradient on a dark
       rounded tile. Render with the Dancing Script font available (bundled in
       the app / installed system-wide) for the authentic studio glyph. The
       shipped app icons are rasterised from branding/splec-icon-1024.png. -->
  <defs>
    <linearGradient id="tile" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#10131f"/>
      <stop offset="1" stop-color="#06070d"/>
    </linearGradient>
    <linearGradient id="stroke" x1="130" y1="110" x2="390" y2="410" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#9db4ff"/>
      <stop offset="1" stop-color="#7c5cff"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="512" height="512" rx="116" fill="url(#tile)"/>
  <text x="262" y="372" text-anchor="middle"
        font-family="'Dancing Script', cursive" font-weight="700" font-size="430"
        fill="url(#stroke)">S</text>
</svg>
